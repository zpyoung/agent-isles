name: Publish npm package

"on":
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate release tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="${GITHUB_REF_NAME#v}"
          if [ "$RELEASE_TAG" != "$PACKAGE_VERSION" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package.json version ${PACKAGE_VERSION}."
            echo "Use a release tag like v${PACKAGE_VERSION} or ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Check package version is not already published
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published."
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Render demo smoke test
        run: npm run render -- --out dist/demo.html --assets local

      - name: Verify package contents
        run: npm run pack:dry-run

      - name: Publish prerelease to npm next dist-tag
        if: ${{ github.event.release.prerelease }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag next --provenance

      - name: Publish stable release to npm latest dist-tag
        if: ${{ !github.event.release.prerelease }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag latest --provenance
