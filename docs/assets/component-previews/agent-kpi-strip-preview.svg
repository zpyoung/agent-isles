<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Agent KPI strip component preview</title>
  <desc id="desc">A responsive strip of key performance indicator cards with values, labels, trends, and compact notes.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="430" rx="28" fill="#f7f6f2"/>
  <g transform="translate(70 58)" font-family="Satoshi, Inter, Arial">
    <text x="0" y="0" fill="#28251d" font-size="28" font-weight="700">agent-kpi-strip</text>
    <text x="0" y="30" fill="#7a7974" font-size="15">Compact metric cards for executive summaries, timeline milestones, and report headers.</text>
  </g>

  <g transform="translate(70 124)" font-family="Satoshi, Inter, Arial" filter="url(#shadow)">
    <g>
      <rect x="0" y="0" width="320" height="190" rx="18" fill="#ffffff" stroke="#d7d2ca"/>
      <text x="26" y="38" fill="#7a7974" font-size="13" font-weight="700" letter-spacing="1.2">PHASE 1 COMPLETE</text>
      <text x="26" y="96" fill="#437a22" font-size="48" font-weight="800">~12</text>
      <text x="124" y="96" fill="#7a7974" font-size="22" font-weight="700">wks</text>
      <rect x="26" y="118" width="112" height="28" rx="14" fill="#e5f1dd"/>
      <text x="82" y="137" text-anchor="middle" fill="#437a22" font-size="13" font-weight="800">↓ was ~26</text>
      <text x="26" y="170" fill="#7a7974" font-size="14">Dev complete from kick-off</text>
    </g>
    <g transform="translate(370 0)">
      <rect x="0" y="0" width="320" height="190" rx="18" fill="#ffffff" stroke="#d7d2ca"/>
      <text x="26" y="38" fill="#7a7974" font-size="13" font-weight="700" letter-spacing="1.2">SOFT LAUNCH</text>
      <text x="26" y="96" fill="#b87a00" font-size="48" font-weight="800">~15</text>
      <text x="124" y="96" fill="#7a7974" font-size="22" font-weight="700">wks</text>
      <rect x="26" y="118" width="112" height="28" rx="14" fill="#e5f1dd"/>
      <text x="82" y="137" text-anchor="middle" fill="#437a22" font-size="13" font-weight="800">↓ was ~28</text>
      <text x="26" y="170" fill="#7a7974" font-size="14">Ireland launch and stabilise</text>
    </g>
    <g transform="translate(740 0)">
      <rect x="0" y="0" width="320" height="190" rx="18" fill="#ffffff" stroke="#d7d2ca"/>
      <text x="26" y="38" fill="#7a7974" font-size="13" font-weight="700" letter-spacing="1.2">FULL DELIVERY</text>
      <text x="26" y="96" fill="#01696f" font-size="48" font-weight="800">~28</text>
      <text x="124" y="96" fill="#7a7974" font-size="22" font-weight="700">wks</text>
      <rect x="26" y="118" width="112" height="28" rx="14" fill="#e5f1dd"/>
      <text x="82" y="137" text-anchor="middle" fill="#437a22" font-size="13" font-weight="800">↓ was ~38</text>
      <text x="26" y="170" fill="#7a7974" font-size="14">Phase 2 complete</text>
    </g>
  </g>

  <g transform="translate(70 360)" font-family="Satoshi, Inter, Arial">
    <rect x="0" y="-26" width="1060" height="44" rx="14" fill="#fbfbf9" stroke="#d7d2ca"/>
    <text x="24" y="2" fill="#7a7974" font-size="14">Authoring shape: </text>
    <text x="140" y="2" fill="#01696f" font-size="14" font-weight="700">&lt;agent-kpi-strip&gt; &lt;agent-kpi label="..." value="..." unit="..." delta="..." /&gt; &lt;/agent-kpi-strip&gt;</text>
  </g>
</svg>
